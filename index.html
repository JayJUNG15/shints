<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHINTS Strategic Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'blob': 'blob 7s infinite',
                        'gradient-x': 'gradientX 6s ease infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        gradientX: {
                            '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
                            '50%': { 'background-size': '200% 200%', 'background-position': 'right center' },
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-900">

    <div class="relative isolate overflow-hidden bg-gray-900">
        <div aria-hidden="true"
            class="absolute inset-x-0 -top-40 -z-10 transform-gpu overflow-hidden blur-3xl sm:-top-80">
            <div style="clip-path: polygon(74.1% 44.1%, 100% 61.6%, 97.5% 26.9%, 85.5% 0.1%, 80.7% 2%, 72.5% 32.5%, 60.2% 62.4%, 52.4% 68.1%, 47.5% 58.3%, 45.2% 34.5%, 27.5% 76.7%, 0.1% 64.9%, 17.9% 100%, 27.6% 76.8%, 76.1% 97.7%, 74.1% 44.1%)"
                class="relative left-[calc(50%-11rem)] aspect-[1155/678] w-[36.125rem] -translate-x-1/2 rotate-[30deg] bg-gradient-to-tr from-[#ff80b5] to-[#9089fc] opacity-20 sm:left-[calc(50%-30rem)] sm:w-[72.1875rem] animate-blob mix-blend-screen">
            </div>
        </div>

        <div class="mx-auto max-w-2xl py-32 sm:py-48 lg:py-56">
            <div class="text-center">
                <div class="mb-8 flex justify-center opacity-0 animate-[fadeInUp_0.8s_ease-out_forwards]">
                    <div
                        class="relative rounded-full px-3 py-1 text-sm leading-6 text-gray-400 ring-1 ring-white/10 hover:ring-white/20 backdrop-blur-sm transition-all duration-300 hover:text-white">
                        Strategic Planning & Operations Innovation
                    </div>
                </div>

                <h1 class="text-5xl font-semibold tracking-tight text-white sm:text-7xl opacity-0 animate-[fadeInUp_0.8s_ease-out_0.2s_forwards]">
                    SHINTS <span class="whitespace-nowrap text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-cyan-400 to-indigo-400 animate-gradient-x">Strategic Lab</span>
                </h1>

                <p class="mt-8 text-lg font-medium text-gray-400 sm:text-xl/8 opacity-0 animate-[fadeInUp_0.8s_ease-out_0.4s_forwards]">
                    Data-driven insights and digital transformation for global garment manufacturing excellence.
                    Focusing on production capacity, supply chain strategy, and AI-driven automation.
                </p>

                <div class="mt-10 flex items-center justify-center gap-x-6 opacity-0 animate-[fadeInUp_0.8s_ease-out_0.6s_forwards]">
                    <a href="https://shints.com" target="_blank" rel="noopener noreferrer"
                        class="rounded-md bg-gradient-to-r from-indigo-500 to-cyan-500 px-5 py-3 text-sm font-semibold text-white shadow-lg hover:shadow-cyan-500/25 transition-all duration-300 hover:-translate-y-0.5 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500">
                        SHINTS WEB
                    </a>
                    <a href="mailto:shints_plan@shints.com" class="group text-sm font-semibold leading-6 text-gray-300 hover:text-white transition-colors duration-300">Contact HQ <span
                            aria-hidden="true" class="inline-block transition-transform duration-300 group-hover:translate-x-1">→</span></a>
                </div>
            </div>
        </div>

        <div aria-hidden="true"
            class="absolute inset-x-0 top-[calc(100%-13rem)] -z-10 transform-gpu overflow-hidden blur-3xl sm:top-[calc(100%-30rem)]">
            <div style="clip-path: polygon(74.1% 44.1%, 100% 61.6%, 97.5% 26.9%, 85.5% 0.1%, 80.7% 2%, 72.5% 32.5%, 60.2% 62.4%, 52.4% 68.1%, 47.5% 58.3%, 45.2% 34.5%, 27.5% 76.7%, 0.1% 64.9%, 17.9% 100%, 27.6% 76.8%, 76.1% 97.7%, 74.1% 44.1%)"
                class="relative left-[calc(50%+3rem)] aspect-[1155/678] w-[36.125rem] -translate-x-1/2 bg-gradient-to-tr from-[#ff80b5] to-[#9089fc] opacity-20 sm:left-[calc(50%+36rem)] sm:w-[72.1875rem] animate-blob mix-blend-screen" style="animation-delay: 2s">
            </div>
        </div>
    </div>

</body>

</html>
